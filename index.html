<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Advanced Custom Video Player</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="video-container" id="videoContainer">
    <video id="myVideo" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"></video>
    
    <div class="big-play-btn" id="bigPlayBtn"><span class="material-icons">play_arrow</span></div>

    <div class="video-controls">
        <div class="timeline-container" id="timelineContainer">
            <div class="timeline"><div class="progress-bar" id="progressBar"></div></div>
        </div>
        
        <div class="controls-buttons">
            <div class="left-controls">
                <button class="control-btn" id="playPauseBtn"><span class="material-icons">play_arrow</span></button>
                <div class="volume-wrapper">
                    <button class="control-btn" id="muteBtn"><span class="material-icons">volume_up</span></button>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
                </div>
                <div class="time-display"><span id="currentTime">00:00</span> / <span id="durationTime">00:00</span></div>
            </div>
            <div class="right-controls">
                <div class="speed-wrapper">
                    <button class="control-btn" id="speedBtn">1x</button>
                    <div class="speed-menu" id="speedMenu">
                        <button data-speed="2">2.0x</button>
                        <button data-speed="1.5">1.5x</button>
                        <button data-speed="1" class="active">1.0x</button>
                        <button data-speed="0.5">0.5x</button>
                    </div>
                </div>
                <button class="control-btn" id="fullscreenBtn"><span class="material-icons">fullscreen</span></button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
