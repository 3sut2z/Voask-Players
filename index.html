<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Video Player like JW Player</title>
    <!-- Thêm thư viện icon Google Material để làm nút bấm giống JW Player -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="video-container" id="videoContainer">
        <!-- Thay link video của bạn vào src dưới đây -->
        <video id="myVideo" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" poster="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/BigBuckBunny.jpg"></video>
        
        <!-- Lớp phủ nút Play lớn ở giữa màn hình khi pause -->
        <div class="big-play-btn" id="bigPlayBtn">
            <span class="material-icons">play_arrow</span>
        </div>

        <!-- Thanh điều khiển điều hướng (Controls Bar) -->
        <div class="video-controls">
            <!-- Thanh tua video (Timeline) -->
            <div class="timeline-container" id="timelineContainer">
                <div class="timeline">
                    <div class="buffered-bar"></div>
                    <div class="progress-bar" id="progressBar"></div>
                    <div class="thumb"></div>
                </div>
            </div>

            <div class="controls-buttons">
                <div class="left-controls">
                    <button class="control-btn" id="playPauseBtn">
                        <span class="material-icons">play_arrow</span>
                    </button>
                    
                    <div class="volume-container">
                        <button class="control-btn" id="muteBtn">
                            <span class="material-icons">volume_up</span>
                        </button>
                        <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1" class="volume-slider">
                    </div>

                    <div class="time-display">
                        <span id="currentTime">00:00</span> / <span id="durationTime">00:00</span>
                    </div>
                </div>

                <div class="right-controls">
                    <button class="control-btn" id="fullscreenBtn">
                        <span class="material-icons">fullscreen</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
