<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Streaming Player</title>
    <!-- Nhúng thư viện Hls.js từ CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1c1c1c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            width: 100%;
            max-width: 800px;
            background: #000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
        .controls-info {
            color: #fff;
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="player-container">
    <!-- Thẻ video chuẩn HTML5 với các nút điều khiển mặc định -->
    <video id="video" controls autoplay muted></video>
</div>

<div class="controls-info">
    <p>Đang phát luồng HLS mã nguồn mở (Demo Live Stream)</p>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const video = document.getElementById('video');
        
        // Thay link .m3u8 của bạn vào đây
        const streamUrl = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8'; 

        if (Hls.isSupported()) {
            // Nếu trình duyệt hỗ trợ Hls.js (Chrome, Firefox, Edge, Safari đời mới...)
            const hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(err => {
                    console.log("Tự động phát bị chặn, chờ người dùng tương tác:", err);
                });
            });

            // Xử lý lỗi trong quá trình stream
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.log("Lỗi mạng, đang thử kết nối lại...");
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.log("Lỗi media, đang cố gắng phục hồi...");
                            hls.recoverMediaError();
                            break;
                        default:
                            console.log("Lỗi không thể phục hồi, hủy stream.");
                            hls.destroy();
                            break;
                    }
                }
            });

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Dành riêng cho Safari trên iPhone/Mac (hỗ trợ sẵn HLS không cần thư viện)
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', () => {
                video.play();
            });
        } else {
            alert("Trình duyệt của bạn không hỗ trợ phát luồng video này.");
        }
    });
</script>

</body>
</html>
