<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Custom Video Player</title>
    <!-- Thư viện icon của Google để hiển thị các nút điều khiển -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="video-container" id="videoContainer">
        <!-- Đường dẫn video mẫu (Bạn có thể đổi src thành file video của bạn) -->
        <video id="myVideo" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" poster="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/BigBuckBunny.jpg"></video>
        
        <!-- Nút phát lớn ở giữa màn hình khi video tạm dừng -->
        <div class="big-play-btn" id="bigPlayBtn">
            <span class="material-icons">play_arrow</span>
        </div>

        <!-- Thanh điều khiển (Controls Bar) -->
        <div class="video-controls">
            <!-- Khu vực thanh tua video (Timeline), tooltip và nút tròn sẽ tự động sinh thêm bằng JS -->
            <div class="timeline-container" id="timelineContainer">
                <div class="timeline">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>

            <!-- Các nút chức năng phía dưới thanh tua -->
            <div class="controls-buttons">
                <!-- Nhóm chức năng bên trái -->
                <div class="left-controls">
                    <button class="control-btn" id="playPauseBtn">
                        <span class="material-icons">play_arrow</span>
                    </button>
                    
                    <!-- Thanh chỉnh âm lượng hiển thị khi hover loa -->
                    <div class="volume-wrapper">
                        <button class="control-btn" id="muteBtn">
                            <span class="material-icons">volume_up</span>
                        </button>
                        <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1">
                    </div>

                    <!-- Bộ đếm thời gian dạng số -->
                    <div class="time-display">
                        <span id="currentTime">00:00</span> / <span id="durationTime">00:00</span>
                    </div>
                </div>

                <!-- Nhóm chức năng bên phải -->
                <div class="right-controls">
                    <!-- Nút tùy chọn tốc độ phát video (0.5x, 1x, 1.5x, 2x) -->
                    <div class="speed-wrapper">
                        <button class="control-btn" id="speedBtn">1x</button>
                        <div class="speed-menu" id="speedMenu">
                            <button data-speed="2">2.0x</button>
                            <button data-speed="1.5">1.5x</button>
                            <button data-speed="1" class="active">1.0x</button>
                            <button data-speed="0.5">0.5x</button>
                        </div>
                    </div>

                    <!-- Nút phóng to toàn màn hình -->
                    <button class="control-btn" id="fullscreenBtn">
                        <span class="material-icons">fullscreen</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
