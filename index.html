<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom GUI Video Player with Big Play Button</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Container bọc toàn bộ player */
        .custom-player {
            position: relative;
            width: 100%;
            max-width: 800px;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            cursor: pointer; /* Click để play/pause */
        }

        video {
            width: 100%;
            display: block;
        }

        /* Nút Big Play ở giữa màn hình */
        .big-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background-color: rgba(255, 62, 62, 0.8); /* Màu đỏ chủ đạo, hơi trong suốt */
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.9;
            transition: opacity 0.3s ease, transform 0.2s ease;
            z-index: 10; /* Đảm bảo nút nằm trên video và controls */
        }

        .big-play-btn:hover {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1); /* Phóng to nhẹ khi hover */
        }

        .big-play-btn svg {
            width: 50px;
            height: 50px;
            fill: #fff; /* Màu biểu tượng trắng */
        }

        /* Thanh điều khiển (GUI) tự dựng */
        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
            display: flex;
            flex-direction: column;
            padding: 15px;
            opacity: 0; /* Ẩn đi ban đầu */
            transition: opacity 0.3s ease;
            z-index: 5; /* Đảm bảo nằm trên video */
        }

        /* Hiện GUI khi di chuột vào player */
        .custom-player:hover .player-controls {
            opacity: 1;
        }

        /* Nhóm hàng chứa các nút bấm */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .controls-left, .controls-right {
            display: flex;
            align-items: center;
            gap: 10px; /* Giảm khoảng cách giữa các nút */
        }

        /* Định dạng các nút bấm - sử dụng icon */
        .btn-control {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 8px; /* Tăng padding để dễ bấm */
            border-radius: 50%; /* Nút tròn */
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-control:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Kích thước icon trong các nút điều khiển */
        .btn-control svg {
            width: 20px;
            height: 20px;
            fill: #fff; /* Màu icon trắng */
        }

        /* Thanh Tiến Trình (Timeline/Progress) */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            border-radius: 3px;
            position: relative;
            /* Ẩn timeline khi nút Big Play đang hiện */
            display: block; 
        }

        /* CSS class để ẩn timeline */
        .progress-container.hidden {
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #ff3e3e; /* Màu đỏ chủ đạo */
            border-radius: 3px;
        }

        /* Thanh âm lượng */
        .volume-slider {
            width: 70px;
            cursor: pointer;
            accent-color: #ff3e3e;
        }

        .time-display {
            color: #ccc;
            font-size: 13px;
            white-space: nowrap; /* Không xuống dòng */
        }
    </style>
</head>
<body>

<div class="custom-player" id="playerContainer">
    <video id="video" autoplay muted></video>

    <button class="big-play-btn" id="bigPlayBtn">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> </button>

    <div class="player-controls">
        
        <div class="progress-container hidden" id="progressContainer"> <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="controls-row">
            <div class="controls-left">
                <button class="btn-control" id="playBtn">
                    <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg> <svg viewBox="0 0 24 24" id="pauseIcon" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg> </button>
                
                <div style="display: flex; align-items: center; gap: 5px;">
                    <button class="btn-control" id="muteBtn">
                        <svg viewBox="0 0 24 24" id="volumeUpIcon"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg> <svg viewBox="0 0 24 24" id="volumeOffIcon" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg> </button>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="1">
                </div>

                <div class="time-display">
                    <span id="currentTime">00:00</span> / <span id="duration">00:00</span>
                </div>
            </div>

            <div class="controls-right">
                <button class="btn-control" id="fullscreenBtn">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg> </button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const video = document.getElementById('video');
        const playerContainer = document.getElementById('playerContainer');
        const bigPlayBtn = document.getElementById('bigPlayBtn');
        
        // Các thành phần GUI
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const muteBtn = document.getElementById('muteBtn');
        const volumeUpIcon = document.getElementById('volumeUpIcon');
        const volumeOffIcon = document.getElementById('volumeOffIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const currentTimeText = document.getElementById('currentTime');
        const durationText = document.getElementById('duration');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        const streamUrl = 'https://raw.githubusercontent.com/3sut2z/M3U8/main/KAMALI.m3u8';

        // --- KHỞI TẠO HLS STREAM ---
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
        }

        // --- XỬ LÝ LOGIC ĐIỀU KHIỂN (GUI LOGIC) ---

        // Hàm cập nhật icon Play/Pause và hiển thị nút Big Play
        function updatePlayPauseUI() {
            if (video.paused) {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                bigPlayBtn.style.display = 'flex'; // Hiện Big Play khi video tạm dừng
                progressContainer.classList.add('hidden'); // Ẩn timeline
            } else {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                bigPlayBtn.style.display = 'none'; // Ẩn Big Play khi video đang phát
                progressContainer.classList.remove('hidden'); // Hiện timeline
            }
        }

        // 1. Play / Pause
        function togglePlay() {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
            updatePlayPauseUI(); // Cập nhật GUI ngay lập tức
        }

        playBtn.addEventListener('click', togglePlay);
        bigPlayBtn.addEventListener('click', togglePlay); // Nút Big Play cũng điều khiển play/pause
        video.addEventListener('click', togglePlay); // Bấm vào giữa màn hình video để Play/Pause

        // Xử lý sự kiện khi video được phát hoặc tạm dừng bởi các yếu tố khác
        video.addEventListener('play', updatePlayPauseUI);
        video.addEventListener('pause', updatePlayPauseUI);

        // 2. Cập nhật Thanh Tiến Trình & Thời gian
        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === Infinity) return "00:00";
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        video.addEventListener('timeupdate', () => {
            // Cập nhật độ dài thanh đỏ (%)
            if (video.duration && video.duration !== Infinity) {
                const percentage = (video.currentTime / video.duration) * 100;
                progressBar.style.width = percentage + '%';
            }
            
            // Cập nhật số giây text
            currentTimeText.innerText = formatTime(video.currentTime);
        });

        video.addEventListener('loadedmetadata', () => {
            durationText.innerText = formatTime(video.duration);
        });

        // 3. Tua video khi click vào thanh tiến trình
        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left; // Vị trí click chuột
            const width = rect.width;
            const clickRatio = clickX / width;
            
            // Tua video đến thời điểm tương ứng
            if (video.duration && video.duration !== Infinity) {
                video.currentTime = clickRatio * video.duration;
            }
        });

        // Hàm cập nhật icon Mute/Volume
        function updateVolumeUI() {
            if (video.muted || video.volume === 0) {
                volumeUpIcon.style.display = 'none';
                volumeOffIcon.style.display = 'block';
            } else {
                volumeUpIcon.style.display = 'block';
                volumeOffIcon.style.display = 'none';
            }
        }

        // 4. Âm lượng & Mute
        volumeSlider.addEventListener('input', (e) => {
            video.volume = e.target.value;
            video.muted = (e.target.value == 0);
            updateVolumeUI();
        });

        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            if (video.muted) {
                volumeSlider.value = 0; // Cập nhật slider khi mute
            } else {
                volumeSlider.value = video.volume; // Cập nhật slider về mức volume trước đó
            }
            updateVolumeUI();
        });

        // 5. Toàn màn hình (Fullscreen)
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                // Phải đưa toàn bộ Container vào chế độ Fullscreen để giữ lại GUI tự dựng
                playerContainer.requestFullscreen().catch(err => {
                    alert(`Không thể mở toàn màn hình: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        // Cập nhật UI lần đầu
        updatePlayPauseUI();
        updateVolumeUI();
    });
</script>

</body>
</html>
